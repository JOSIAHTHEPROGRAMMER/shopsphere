spring.application.name=shopsphere
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:shopsphere
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jackson.mapper.sort-properties-alphabetically=false

# JWT Configuration - Load from environment variables or application-local.properties
# In production: Set JWT_SECRET and JWT_EXPIRATION environment variables
# For local dev: Create src/main/resources/application-local.properties with the values
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}
